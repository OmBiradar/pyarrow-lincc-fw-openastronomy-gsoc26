name: Benchmark
on:
  push:
    branches: [ "main" ]
  pull_request:
permissions:
  contents: write
  pull-requests: write
  actions: write
jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 8G
      CCACHE_COMPRESS: "true"
      GH_TOKEN: ${{ github.token }}
      # head_ref is the branch name on Pull Requests.
      # ref_name is the branch name on direct pushes.
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: System setup
        run: |
          # Update packages
          sudo apt-get update
          # Required packages
          sudo apt-get install -y ccache ninja-build libsnappy-dev libbenchmark-dev vmtouch golang
      - name: Restore and Clean cache
        uses: ./.github/actions/manage-cache
        with:
          cache_branch: ${{ env.CACHE_BRANCH }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run the golang automated runner
        run: |
          cd runner
          go run .
