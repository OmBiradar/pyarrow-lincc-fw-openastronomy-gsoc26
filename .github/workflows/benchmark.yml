name: Benchmark
on:
  push:
    branches: [ "main" ]
  pull_request:
permissions:
  contents: write
  pull-requests: write
  actions: write
jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 8G
      CCACHE_COMPRESS: "true"
      GH_TOKEN: ${{ github.token }}
      # head_ref is the branch name on Pull Requests.
      # ref_name is the branch name on direct pushes.
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Explicitly checkout the branch so we can push commits back to it
          ref: ${{ github.head_ref || github.ref_name }}
      - name: System setup
        run: |
          # Update packages
          sudo apt-get update
          # Required packages
          sudo apt-get install -y ccache ninja-build libsnappy-dev libbenchmark-dev vmtouch golang
      - name: Restore and Clean cache
        uses: ./.github/actions/manage-cache
        with:
          cache_branch: ${{ env.CACHE_BRANCH }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run the golang automated runner
        run: |
          cd runner
          go run .
      - name: Commit and push database files
        run: |
          # 1. Configure Git as the GitHub Actions bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # 2. Stage the new database files (adjust the path if they aren't in the root/runner dir)
          git add "**/*.db"
          # 3. Commit and push ONLY if there are actually changes
          if ! git diff-index --quiet HEAD; then
            # The [skip ci] flag is crucial so this commit doesn't trigger an infinite loop of workflows
            git commit -m "chore: auto-update benchmark database [skip ci]"
            git push
          else
            echo "No database changes detected. Skipping commit."
          fi